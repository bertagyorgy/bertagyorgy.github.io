<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Végtelen Amőba</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="menu.css">
</head>
<body>
  <div id="header">
    <h1 class="title">Infinity Grid</h1> <!-- A játék neve középen fent -->
      <p class="logo-subtext">A végtelen amőba!</p> <!-- Pulzáló, dőlt szöveg -->
  </div>
    <div class="menu-container">
        <div class="menu-buttons">
            <button id="playbtn" onclick="openMenu('play')">Játék</button>
            <button onclick="openMenu('gamemodes')">Játékmódok</button>
            <button onclick="openMenu('settings')">Beállítások</button>
        </div>

        <!-- Almenük -->
        <div id="play" class="submenu">
            <button onclick="window.location.href='botgame.html?difficulty=easy'">Könnyű</button>
            <button onclick="window.location.href='botgame.html?difficulty=medium'">Közepes</button>
            <button onclick="window.location.href='botgame.html?difficulty=hard'">Nehéz</button>
            <button onclick="closeMenu()">Vissza</button>
        </div>

        <div id="gamemodes" class="submenu">
            <button onclick="window.location.href='twoplayer.html'">Kétjátékos mód</button>
            <button onclick="window.location.href='chaos.html'">Káosz mód</button>
            <button onclick="closeMenu()">Vissza</button>
        </div>

        <div id="settings" class="submenu">
            <p>Settings opciók (pl. hang, fényerő stb.)</p>
            <button onclick="closeMenu()">Vissza</button>
        </div>
        <div class="info-icon" onclick="toggleInfoPopup()">i</div>
        <div class="info-popup" id="infoPopup">
        <div class="info-popup-content">
            <span class="close-btn" onclick="toggleInfoPopup()">&times;</span>
            <h2>Játék Információ</h2><br>
            <p>Üdvözlünk az Infinity Grid játékban! A célod, hogy legyőzd az ellenfeledet egy sor, oszlop, vagy átló mentén létrehozott ötös sorozattal. Sok sikert!</p>
        </div>
    </div>
    </div>
    <script src="menu.js"></script>
</body>
</html>
